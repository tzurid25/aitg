name: aitg

services:
  postgres:
    image: postgres:16-alpine
    container_name: aitg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aitg
      POSTGRES_PASSWORD: aitg_dev_password
      POSTGRES_DB: aitg_dev
    ports:
      - "5432:5432"
    volumes:
      - aitg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitg -d aitg_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aitg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aitg_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aitg_postgres_data:
  aitg_redis_data:
